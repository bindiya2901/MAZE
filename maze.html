<!-- 🔥 LOGIC -->
<script type="module">
import { db } from "./js/firebase.js";
import {
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
/* ================= AUTH ================= */
const uid = localStorage.getItem("uid");
if (!uid) {
  location.href = "index.html";
}

/* ================= FETCH PROGRESS ================= */
const ref = doc(db, "users", uid);
const snap = await getDoc(ref);

const unlockedLevel = snap.exists()
  ? snap.data().unlockedLevel || 1
  : 1;

localStorage.setItem("currentLevel", unlockedLevel);

/* ================= RESUME ================= */
const resumeBtn = document.getElementById("resumeBtn");
resumeBtn.onclick = () => {
  location.href = `levels/level${unlockedLevel}.html`;
};

/* ================= LEVEL BUTTONS ================= */
const buttons = document.querySelectorAll("#levels button");

buttons.forEach(btn => {
  const level = Number(btn.dataset.level);

  if (level > unlockedLevel) {
    btn.disabled = true;
    btn.classList.add("locked");
  }

  btn.onclick = () => {
    if (level <= unlockedLevel) {
      location.href = `levels/level${level}.html`;
    }
  };
});
</script>

<script type="module" src="js/profile.js"></script>
