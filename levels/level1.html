<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Level 1</title>
  <link rel="stylesheet" href="../css/level.css" />
</head>
<body>

<div id="level-card">
  <h2>Level 1</h2>
  <div id="timer">Time: 180</div>

  <div id="maze-wrapper">
    <div id="grid"></div>
    <div id="items"></div>
    <div id="wall-overlay"></div>
  </div>
</div>

<div class="mobile-controls">
  <button id="upBtn">⬆</button>

  <div class="middle-row">
    <button id="leftBtn">⬅</button>
    <button id="rightBtn">➡</button>
  </div>

  <button id="downBtn">⬇</button>
</div>

<!-- MODAL -->
<div id="levelModal">
  <div class="modal-box">
    <h3>Level Completed!</h3>
    <button id="modalOk">OK</button>
  </div>
</div>

<script type="module" src="../js/level1.js"></script>
</body>
</html>
