<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Maze - Select Level</title>
  <link rel="stylesheet" href="css/level.css" />
</head>

<body>

<header class="main-header">
  <div class="header-left">
    <img src="assets/college-logo.png" class="logo">
    <img src="assets/club-logo.png" class="logo">
  </div>

  <div class="navbar-center">Maze</div>

  <nav class="header-nav">
    <a href="index.html">Home</a>
    <a href="maze.html">Maze</a>
  </nav>

  <div class="profile-wrapper hidden" id="profileWrapper">
    <img id="profilePic" class="profile-pic" />

    <div class="profile-dropdown hidden" id="profileDropdown">
      <div class="profile-info">
        <p id="profileName"></p>
        <p id="profileEmail"></p>
      </div>

      <button onclick="location.href='leaderboard.html'">
        🏆 Leaderboard
      </button>

      <button id="logoutBtn" class="logout-btn">
        🚪 Logout
      </button>
    </div>
  </div>
</header>

<main>
  <h2>Select Level</h2>

  <button id="resumeBtn">Resume</button>

  <div id="levels">
    <!-- Your level buttons 1–30 -->
    ${[...Array(30)].map((_,i)=>`<button data-level="${i+1}"><span class="label">${i+1}</span></button>`).join("")}
  </div>
</main>

<footer>
  Contact Us: emceeonclubepgi@gmail.com
</footer>

<script type="module">
import { db } from "./js/firebase.js";
import {
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

document.addEventListener("DOMContentLoaded", async () => {

  const uid = localStorage.getItem("uid");

  if (!uid) {
    alert("Please sign in first.");
    window.location.href = "login.html"; // change if needed
    return;
  }

  try {
    const ref = doc(db, "users", uid);
    const snap = await getDoc(ref);

    const unlockedLevel = snap.exists()
      ? snap.data().unlockedLevel || 1
      : 1;

    localStorage.setItem("currentLevel", unlockedLevel);

    const resumeBtn = document.getElementById("resumeBtn");
    resumeBtn.onclick = () => {
      window.location.href = `levels/level${unlockedLevel}.html`;
    };

    const buttons = document.querySelectorAll("#levels button");

    buttons.forEach(btn => {
      const level = Number(btn.dataset.level);

      if (level > unlockedLevel) {
        btn.disabled = true;
        btn.classList.add("locked");
      }

      btn.onclick = () => {
        if (level <= unlockedLevel) {
          window.location.href = `levels/level${level}.html`;
        }
      };
    });

  } catch (err) {
    console.error("Error loading progress:", err);
  }

});
</script>

<script type="module" src="js/profile.js"></script>

</body>
</html>
